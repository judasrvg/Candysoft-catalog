<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candysoft Studio | Catálogo Fotográfico</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Candysoft Studio</h1>
    <p>Catálogo fotográfico por categoría</p>
  </header>

  <main>
    <nav class="filters" aria-label="Filtrar por categoría" id="category-filters"></nav>
    <section class="gallery" id="gallery" aria-live="polite"></section>
  </main>

  <dialog id="lightbox" class="lightbox" aria-label="Vista completa de fotografía">
    <button id="lightbox-close" class="lightbox-close" aria-label="Cerrar vista completa">×</button>
    <img id="lightbox-image" src="" alt="" />
  </dialog>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
